{ font-family: sans-serif; background-color: #eceff1; margin: 0; padding: 20px; color: #37474f; }

<body>

<div class="container">
    <div class="section section-wishes">
        <h2>🥚 たまごウィッシュリスト</h2>
        <div class="status-bar" id="statusBar">比率: 加熱待ち...</div>
        <div class="input-box">
            <input type="text" id="wishInput" placeholder="純粋な願いを入力（ニヤニヤできる？）">
            <div class="egg-btns">
                <button class="btn-raw" onclick="addWish('raw')">生卵🥚</button>
                <button class="btn-boiled" onclick="addWish('boiled')">ゆで卵🍳</button>
                <button class="btn-marinated" onclick="addWish('marinated')">煮卵🍲</button>
            </div>
        </div>
        <div id="wishList"></div>
    </div>

    <div class="section section-side">
        <h2>📝 指示書 (ToDo)</h2>
        <div class="todo-legend">
            <span>⬜️未着手</span><span>☑完了</span><span>✍️着手</span><span>😴待ち</span><span>⏸️持越</span><span>☒中止</span>
        </div>
        <div class="input-box">
            <input type="text" id="todoInput" placeholder="淡々とやるべきタスクを入力...">
            <button style="width:100%; padding:10px; border-radius:8px; cursor:pointer;" onclick="addTodo()">ToDo追加</button>
        </div>
        <div id="todoList"></div>
    </div>

    <div class="section section-harvest">
        <h2>✨ 収穫ボード (Harvest)</h2>
        <div id="harvestList"></div>
        
        <div id="shineSection" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
            <button class="shell-toggle" onclick="toggleShine()">✨ 輝きの記録 を表示</button>
            <div id="shineList" style="display: none; margin-top:15px;"></div>
        </div>

        <div id="shellSection" style="margin-top: 20px;">
            <button class="shell-toggle" onclick="toggleShell()">🐣 卵の殻 アーカイブを表示</button>
            <div id="shellList" style="display: none; margin-top:15px;"></div>
        </div>
    </div>
</div>

<script type="module">
    // --- Firebaseの準備 ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBEE451bCNLV-Ty337LyZryFlZqqiN4mxo",
        authDomain: "moonboard-27ebf.firebaseapp.com",
        projectId: "moonboard-27ebf",
        storageBucket: "moonboard-27ebf.firebasestorage.app",
        messagingSenderId: "437383444283",
        appId: "1:437383444283:web:f2fab00c5e190b2ca9291e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "data", "tamago-data");

    // --- データと状態 ---
    let wishes = [];
    let todos = [];
    let harvests = [];
    let shells = [];
    let shines = []; // 新機能用のデータ配列
    let isFirstLoad = true;

    // render関数の外側に書いてください
let wishSortableInstance = null;
let todoSortableInstance = null;
    
    const statuses = [
        { icon: '⬜️', class: '' }, { icon: '☑', class: 'st-done' }, { icon: '✍️', class: '' },
        { icon: '😴', class: '' }, { icon: '⏸️', class: '' }, { icon: '☒', class: 'st-cancel' }
    ];

    const formatDate = (ts) => new Date(ts).toLocaleDateString('ja-JP');
    const formatYearMonth = (ts) => { const d = new Date(ts); return `${d.getFullYear()}年 ${d.getMonth() + 1}月`; };

    // --- Firebase リアルタイム購読 ---
    onSnapshot(docRef, (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            wishes = data.wishes || [];
            todos = data.todos || [];
            harvests = data.harvests || [];
            shells = data.shells || [];
            shines = data.shines || []; // 新機能用
        }
        render();
// データが揃ったので、画面を「表示（不透明度1）」にする
    document.body.style.opacity = "1"; 
    
    isFirstLoad = false;
    });

    async function saveToCloud() {
        await setDoc(docRef, { wishes, todos, harvests, shells, shines });
    }

    // --- ボタンから呼ぶ関数を登録 ---
    window.addWish = (type) => {
        const input = document.getElementById('wishInput');
        if (!input.value) return;
        wishes.unshift({ text: input.value, type: type, created: Date.now(), subtasks: [] });
        input.value = '';
        saveToCloud();
    };

    window.addTodo = (text = null) => {
        const input = document.getElementById('todoInput');
        const val = text || input.value;
        if (!val) return;
        todos.unshift({ text: val, statusIdx: 0, subtasks: [] });
        if (!text) input.value = '';
        saveToCloud();
    };

    window.addWishSubTask = (pIdx, inputEl) => {
        if (!inputEl.value) return;
        if (!wishes[pIdx].subtasks) wishes[pIdx].subtasks = [];
        wishes[pIdx].subtasks.push({ text: inputEl.value, statusIdx: 0 });
        inputEl.value = ''; 
        saveToCloud();
    };

    window.toggleWishSubStatus = (pIdx, sIdx) => {
        wishes[pIdx].subtasks[sIdx].statusIdx = (wishes[pIdx].subtasks[sIdx].statusIdx + 1) % statuses.length;
        saveToCloud();
    };

    window.deleteWishSubTask = (pIdx, sIdx) => {
        wishes[pIdx].subtasks.splice(sIdx, 1);
        saveToCloud();
    };

    window.addSubTask = (pIdx, inputEl) => {
        if (!inputEl.value) return;
        if (!todos[pIdx].subtasks) todos[pIdx].subtasks = [];
        todos[pIdx].subtasks.push({ text: inputEl.value, statusIdx: 0 });
        inputEl.value = ''; 
        saveToCloud();
    };

    window.toggleSubStatus = (pIdx, sIdx) => {
        todos[pIdx].subtasks[sIdx].statusIdx = (todos[pIdx].subtasks[sIdx].statusIdx + 1) % statuses.length;
        saveToCloud();
    };

    window.deleteSubTask = (pIdx, sIdx) => {
        todos[pIdx].subtasks.splice(sIdx, 1);
        saveToCloud();
    };

    window.jobChange = (index) => {
        const item = wishes[index];
        if (item.type === 'raw') item.type = 'boiled';
        else if (item.type === 'boiled') item.type = 'marinated';
        else if (item.type === 'marinated') {
            if(confirm("煮卵を指示書（ToDo）へ移動させますか？")) {
                todos.unshift({ text: item.text, statusIdx: 0, subtasks: item.subtasks || [] });
                wishes.splice(index, 1);
            }
        }
        saveToCloud();
    };

    window.toggleTodoStatus = (idx) => { todos[idx].statusIdx = (todos[idx].statusIdx + 1) % statuses.length; saveToCloud(); };
    
    // 【修正】収穫時に子タスクも記録するように変更
    window.harvestWish = (index) => {
        const item = wishes[index]; 
        const now = Date.now();
        const subtext = (item.subtasks || []).map(s => s.text).join(', '); // 子タスクを文章化
        harvests.unshift({ 
            text: item.text, 
            subtext: subtext, // 子タスク記録用フィールドを追加
            created: item.created, 
            harvested: now, 
            days: Math.floor((now - item.created) / 86400000) 
        });
        wishes.splice(index, 1); 
        saveToCloud();
    };

    // 新機能: 輝きの記録へ移動
    window.moveToShine = (index) => {
        const item = todos[index];
        const subtext = (item.subtasks || []).map(s => s.text).join(', ');
        shines.unshift({ 
            text: item.text, 
            subtext: subtext, 
            shined: Date.now() 
        });
        todos.splice(index, 1); 
        saveToCloud();
    };

    window.moveToShell = (index) => {
        const item = wishes[index];
        shells.unshift({ text: item.text, created: item.created, shelved: Date.now() });
        wishes.splice(index, 1); saveToCloud();
    };

    window.deleteTodo = (idx) => { if(confirm("ToDoを削除しますか？")) { todos.splice(idx, 1); saveToCloud(); } };
    window.deleteWish = (i) => { if(confirm("削除しますか？")) { wishes.splice(i, 1); saveToCloud(); } };
    window.toggleShell = () => { const list = document.getElementById('shellList'); list.style.display = list.style.display === 'none' ? 'block' : 'none'; };
    window.toggleShine = () => { const list = document.getElementById('shineList'); list.style.display = list.style.display === 'none' ? 'block' : 'none'; };
    window.deleteHarvest = (i) => { harvests.splice(i, 1); saveToCloud(); };
    window.deleteShell = (i) => { shells.splice(i, 1); saveToCloud(); };
    window.deleteShine = (i) => { if(confirm("記録を削除しますか？")) { shines.splice(i, 1); saveToCloud(); } };

    // 【追加】特定の月の表示を切り替える関数
    window.toggleMonth = (monthId) => {
        const target = document.getElementById(monthId);
        if (target) {
            target.style.display = target.style.display === 'none' ? 'block' : 'none';
        }
    };

    function render() {
        const wishContainer = document.getElementById('wishList');
        const todoContainer = document.getElementById('todoList');
        const harvestContainer = document.getElementById('harvestList');
        const shellContainer = document.getElementById('shellList');
        const shineContainer = document.getElementById('shineList');
        
        wishContainer.innerHTML = ''; todoContainer.innerHTML = ''; harvestContainer.innerHTML = ''; shellContainer.innerHTML = ''; shineContainer.innerHTML = '';
        let counts = { raw: 0, boiled: 0, marinated: 0 };

        wishes.forEach((item, i) => {
            counts[item.type]++;
            const div = document.createElement('div');
            div.className = `item ${item.type}`;
            div.dataset.id = i;

            const subHtml = (item.subtasks || []).map((sub, si) => {
                const ss = statuses[sub.statusIdx || 0];
                return `<div class="subtask-item">
                    <span class="handle">⠿</span>
                    <span class="status-icon" onclick="toggleWishSubStatus(${i},${si})">${ss.icon}</span>
                    <span class="sub-title ${ss.class}">${sub.text}</span>
                    <span style="cursor:pointer; color:#ccc; margin-left:auto;" onclick="deleteWishSubTask(${i},${si})">×</span>
                </div>`;
            }).join('');

            const label = item.type === 'raw' ? '生卵 (WISH)' : item.type === 'boiled' ? 'ゆで卵 (HOPE)' : '煮卵 (READY)';
            div.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <span class="handle">⠿</span>
                    <span class="tag">${label}</span>
                </div>
                <strong>${item.text}</strong>
                <div class="subtask-list" data-parent-idx="${i}">${subHtml}</div>
                <div class="sub-input-box">
                    <input type="text" placeholder="子タスク..." onkeypress="if(event.key==='Enter') addWishSubTask(${i}, this)">
                    <button class="btn-sub-add" onclick="addWishSubTask(${i}, this.previousElementSibling)">+</button>
                </div>
                <span class="date-info">🌱 追加: ${formatDate(item.created)}</span>
                <div class="actions">
                    <button onclick="jobChange(${i})">🔥 成長</button>
                    <button onclick="harvestWish(${i})" style="color: #2e7d32;">✨ 収穫</button>
                    <button onclick="moveToShell(${i})" style="color: #888;">🐣 殻へ</button>
                    <button onclick="deleteWish(${i})">🗑️</button>
                </div>`;
            wishContainer.appendChild(div);

            new Sortable(div.querySelector('.subtask-list'), {
                handle: '.handle', 
                animation: 150,
                delay: 100, // 0.1秒長押しでドラッグ開始
                delayOnTouchOnly: true, // スマホの時だけディレイを適用 
                onEnd: (evt) => {
                    const subtasks = wishes[i].subtasks;
                    const [movedItem] = subtasks.splice(evt.oldIndex, 1);
                    subtasks.splice(evt.newIndex, 0, movedItem);
                    saveToCloud();
                }
            });
        });

        todos.forEach((item, i) => {
            const s = statuses[item.statusIdx || 0];
            const div = document.createElement('div');
            div.className = 'item todo';
            div.dataset.id = i;

            const subHtml = (item.subtasks || []).map((sub, si) => {
                const ss = statuses[sub.statusIdx || 0];
                return `<div class="subtask-item">
                    <span class="handle">⠿</span>
                    <span class="status-icon" onclick="toggleSubStatus(${i},${si})">${ss.icon}</span>
                    <span class="sub-title ${ss.class}">${sub.text}</span>
                    <span style="cursor:pointer; color:#ccc; margin-left:auto;" onclick="deleteSubTask(${i},${si})">×</span>
                </div>`;
            }).join('');

            // 【修正箇所】🗑️ボタンの上に✨️ボタンを縦に並べるよう構造を変更
            div.innerHTML = `
                <div class="task-row" style="display:flex; align-items: flex-start; gap:8px;">
                    <span class="handle">⠿</span>
                    <span class="status-icon" onclick="toggleTodoStatus(${i})">${s.icon}</span>
                    <span class="task-text ${s.class}" onclick="toggleTodoStatus(${i})">${item.text}</span>
                    <div style="display:flex; flex-direction:column; gap:5px; align-items:center;">
                        <button onclick="moveToShine(${i})" style="border:none; background:none; cursor:pointer; font-size:14px; padding:2px;">✨</button>
                        <button onclick="deleteTodo(${i})" style="border:none; background:none; cursor:pointer; font-size:14px; color:#ccc; padding:2px;">🗑️</button>
                    </div>
                </div>
                <div class="subtask-list">${subHtml}</div>
                <div class="sub-input-box">
                    <input type="text" placeholder="子タスク..." onkeypress="if(event.key==='Enter') addSubTask(${i}, this)">
                    <button class="btn-sub-add" onclick="addSubTask(${i}, this.previousElementSibling)">+</button>
                </div>`;
            todoContainer.appendChild(div);

            new Sortable(div.querySelector('.subtask-list'), {
                handle: '.handle', animation: 150, onEnd: (evt) => {
                    const subtasks = todos[i].subtasks;
                    const [movedItem] = subtasks.splice(evt.oldIndex, 1);
                    subtasks.splice(evt.newIndex, 0, movedItem);
                    saveToCloud();
                }
            });
        });

        renderHarvestAndShells(harvestContainer, shellContainer, shineContainer);
        updateStatusBar(counts, wishes.length);
        initMainSortables();
    }


function initMainSortables() {
    const wishEl = document.getElementById('wishList');
    const todoEl = document.getElementById('todoList');

    // 1. 古い監視役をクビにする（これがiPhone対策）
    if (wishSortableInstance) wishSortableInstance.destroy();
    if (todoSortableInstance) todoSortableInstance.destroy();

    const options = {
        handle: '.handle',
        animation: 150,
        delay: 100,
        delayOnTouchOnly: true,
        touchStartThreshold: 5,
        forceFallback: true ,
        // これを追加：ドラッグ開始時に文字選択を解除する
        onStart: function() {
        window.getSelection().removeAllRanges();
}
};

    // 2. 新しく監視役を雇う
    wishSortableInstance = new Sortable(wishEl, {
        ...options,
        onEnd: (evt) => {
            if (evt.oldIndex === evt.newIndex) return;
            const [movedItem] = wishes.splice(evt.oldIndex, 1);
            wishes.splice(evt.newIndex, 0, movedItem);
            saveToCloud();
        }
    });

    todoSortableInstance = new Sortable(todoEl, {
        ...options,
        onEnd: (evt) => {
            if (evt.oldIndex === evt.newIndex) return;
            const [movedItem] = todos.splice(evt.oldIndex, 1);
            todos.splice(evt.newIndex, 0, movedItem);
            saveToCloud();
        }
    });
}

    // 【修正】収穫ボードの表示形式を変更（親タイトル［子タスク, 子タスク...］）
    function renderHarvestAndShells(harvestContainer, shellContainer, shineContainer) {
        const groups = {};
        const currentMonth = formatYearMonth(Date.now()); 

        harvests.forEach((item, idx) => { 
            const key = formatYearMonth(item.harvested); 
            if (!groups[key]) groups[key] = []; 
            groups[key].push({...item, originalIndex: idx}); 
        });

        Object.keys(groups).forEach(month => {
            const isCurrent = month === currentMonth;
            const monthId = `month-${month.replace(/\s+/g, '')}`;
            
            const g = document.createElement('div'); 
            g.className = 'harvest-group';
            
            const arrow = isCurrent ? '' : ' ▾';
            const displayStyle = isCurrent ? 'block' : 'none';

            g.innerHTML = `<div class="month-header" onclick="toggleMonth('${monthId}')">📅 ${month} の収穫${arrow}</div>
                           <div id="${monthId}" style="display: ${displayStyle}"></div>`;
            
            const monthList = g.querySelector(`#${monthId}`);
            
            groups[month].forEach(item => {
                const d = document.createElement('div'); 
                // 罫線を消すために border-left を 0 に変更
                d.className = 'item harvest';
                d.style.borderLeft = '0'; 

                // 親タスクタイトル［子タスク１, 子タスク２…］の形式を作成
                const subPart = item.subtext ? ` ［${item.subtext}］` : '';
                
                d.innerHTML = `
                    <div class="harvest-main" style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <strong>${item.text}${subPart}</strong>
                        <button onclick="deleteHarvest(${item.originalIndex})" style="border:none; background:none; cursor:pointer; color:#ccc;">🗑️</button>
                    </div>
                    <div class="harvest-detail">📅 ${formatDate(item.created)} → ${formatDate(item.harvested)}　⏳ ${item.days}日間</div>`;
                monthList.appendChild(d);
            });
            harvestContainer.appendChild(g);
        });
        
        shells.forEach((item, i) => {
            const sd = document.createElement('div'); sd.className = 'shell-item';
            sd.innerHTML = `<span style="font-size:0.8rem;">・${item.text} <small>(${formatDate(item.created)}～${formatDate(item.shelved)})</small></span><button onclick="deleteShell(${i})" style="border:none; background:none; color:#ccc; cursor:pointer;">🗑️</button>`;
            shellContainer.appendChild(sd);
        });

        // 輝きの記録を描画
        shines.forEach((item, i) => {
            const sd = document.createElement('div'); sd.className = 'shell-item';
            const subPart = item.subtext ? ` <span style="color:#666;">[${item.subtext}]</span>` : '';
            sd.innerHTML = `<span style="font-size:0.8rem;">✨ ${item.text}${subPart} <small>(${formatDate(item.shined)})</small></span><button onclick="deleteShine(${i})" style="border:none; background:none; color:#ccc; cursor:pointer;">🗑️</button>`;
            shineContainer.appendChild(sd);
        });
    }

    function updateStatusBar(counts, totalLength) {
        const total = totalLength || 1;
        document.getElementById('statusBar').innerHTML = `比率: 生 ${Math.round((counts.raw/total)*100)}% | ゆで ${Math.round((counts.boiled/total)*100)}% | 煮 ${Math.round((counts.marinated/total)*100)}% <span id="shrinkAlert" class="alert"></span>`;
        if (counts.raw === 0 && totalLength > 0) document.getElementById('shrinkAlert').innerText = "⚠️ 警告：生卵（純粋な願い）が不足しています！";
    }

</script>
