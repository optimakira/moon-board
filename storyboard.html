<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絵コンテメーカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Bebas+Neue&display=swap');

  :root {
    --bg: #f5f2ec;
    --panel: #fdfaf5;
    --ink: #1a1714;
    --mid: #6b6560;
    --rule: #d4cfc8;
    --accent: #c0392b;
    --frame-bg: #fff;
    --frame-border: #1a1714;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--ink);
    color: var(--bg);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: #fff;
    flex-shrink: 0;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .btn {
    padding: 7px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    border-radius: 3px;
    transition: opacity 0.15s;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.82; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-save { background: #2a7a4b; color: #fff; }
  .btn-cloud { background: #2563eb; color: #fff; }

  .app-layout {
    display: flex;
    height: calc(100vh - 55px);
    overflow: hidden;
  }

  #sidebar {
    width: 200px;
    flex-shrink: 0;
    background: #1f1c19;
    color: #ccc;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    padding: 14px 14px 6px;
  }

  .project-list {
    flex: 1;
    overflow-y: auto;
  }

  .project-item {
    padding: 10px 12px;
    font-size: 12px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    gap: 6px;
    color: #999;
  }
  .project-item:hover { background: #2a2520; color: #fff; }
  .project-item.active { border-left-color: var(--accent); background: #2a2520; color: #fff; }
  .project-item .proj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .project-item .del-proj { opacity: 0; font-size: 13px; color: #555; padding: 2px 4px; line-height: 1; }
  .project-item:hover .del-proj { opacity: 1; }
  .project-item .overwrite-btn {
    display: none;
    font-size: 10px;
    color: #888;
    background: #2e2b28;
    border: 1px solid #444;
    border-radius: 3px;
    padding: 2px 6px;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .project-item.active .overwrite-btn { display: inline-block; }
  .project-item .overwrite-btn:hover { color: #fff; border-color: #888; }

  .sidebar-new {
    padding: 10px;
    border-top: 1px solid #2a2520;
  }
  .sidebar-new button {
    width: 100%;
    padding: 8px;
    background: transparent;
    color: #777;
    border: 1px dashed #333;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .sidebar-new button:hover { color: #fff; border-color: #666; }

  /* ─── MAIN ─── */
  #main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: calc(100vh - 55px);
  }

  #input-area {
    flex-shrink: 0;
  }

  #storyboard {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  #input-area {
    padding: 18px 24px;
    border-bottom: 1px solid var(--rule);
    background: var(--panel);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  #project-title-input {
    flex: 1;
    min-width: 160px;
    padding: 7px 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 4px;
    color: var(--ink);
    outline: none;
  }
  #project-title-input:focus { border-color: var(--ink); }

  #input-area label {
    display: block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    min-height: 90px;
    height: auto;
    padding: 10px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 4px;
    resize: none;
    color: var(--ink);
    outline: none;
    overflow: hidden;
  }
  textarea:focus { border-color: var(--ink); }

  /* ─── STORYBOARD ─── */
  #board-inner {
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 2px;
    overflow: hidden;
  }

  .empty-state {
    padding: 60px 24px;
    text-align: center;
    color: var(--mid);
    font-size: 13px;
    line-height: 2;
    border: 2px dashed var(--rule);
    border-radius: 4px;
  }
  .empty-state .hint { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

  /* ─── EACH ROW ─── */
  .sb-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--rule);
  }
  .sb-row:last-child { border-bottom: none; }

  .sb-frame {
    background: var(--panel);
    border-right: 1px solid var(--rule);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 16:9の点線枠 */
  .sb-frame .frame-box {
    aspect-ratio: 16/9;
    background: var(--panel);
    position: relative;
    border: 1.5px dashed #c8c2ba;
    box-sizing: border-box;
    margin: 12px;
    width: calc(100% - 24px);
  }

  .frame-number {
    position: absolute;
    top: 5px;
    left: 7px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: #c8c2ba;
    user-select: none;
  }

  .sb-text {
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
  }

  .sb-text p {
    font-size: 12px;
    line-height: 1.9;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--ink);
    color: #fff;
    padding: 10px 18px;
    border-radius: 4px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* ─── MOBILE ─── */
  @media (max-width: 640px) {
    .app-layout { flex-direction: column; }
    #sidebar {
      width: 100%;
      flex-direction: row;
      align-items: center;
      overflow-x: auto;
      min-height: auto;
    }
    .sidebar-title { display: none; }
    .project-list {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      flex: 1;
      padding: 6px 4px;
    }
    .project-item {
      border-left: none;
      border-bottom: 2px solid transparent;
      padding: 6px 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .project-item.active { border-bottom-color: var(--accent); border-left: none; }
    .del-proj { display: none !important; }
    .sidebar-new { padding: 6px 8px; border-top: none; border-left: 1px solid #2a2520; }
    .sidebar-new button { width: auto; padding: 6px 10px; font-size: 18px; border: none; }
    header { padding: 10px 14px; }
    header h1 { font-size: 20px; }
    .btn { padding: 6px 10px; font-size: 11px; }
    #input-area { padding: 12px 14px; }
    #storyboard { padding: 12px; }
    .sb-text { padding: 10px 12px; }
    .sb-text p { font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <h1>STORYBOARD</h1>
  <div class="header-controls">
    <span style="font-size:10px;color:#777;">空白行でコマ区切り</span>
    <button class="btn btn-primary" onclick="buildBoard()">生成</button>
    <button class="btn btn-cloud" onclick="saveToCloud()">☁ 保存</button>
    <button class="btn btn-save" onclick="saveAsPng()">PNG</button>
  </div>
</header>

<div class="app-layout">
  <div id="sidebar">
    <div class="sidebar-title">Projects</div>
    <div class="project-list" id="project-list"></div>

  </div>

  <div id="main-content">
    <div id="input-area">
      <div class="input-row">
        <input type="text" id="project-title-input" placeholder="プロジェクト名..." value="無題">
      </div>
      <label>テキストをペースト（空白行でコマ区切り）</label>
      <textarea id="text-input" placeholder="会話文や脚本をここにペースト..."></textarea>
    </div>

    <div id="storyboard">
      <div id="board-inner">
        <div class="empty-state">
          <div class="hint">▤</div>
          テキストをペーストして「生成」を押してください
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, deleteDoc, collection, query, orderBy, getDocs }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBEE451bCNLV-Ty337LyZryFlZqqiN4mxo",
    authDomain: "moonboard-27ebf.firebaseapp.com",
    projectId: "moonboard-27ebf",
    storageBucket: "moonboard-27ebf.firebasestorage.app",
    messagingSenderId: "437383444283",
    appId: "1:437383444283:web:f2fab00c5e190b2ca9291e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let projects = [];
  let currentId = null;

  // ─── TOAST ───
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── LOAD ALL ───
  async function loadProjects() {
    const col = collection(db, 'storyboard-projects');
    const snap = await getDocs(query(col, orderBy('updatedAt', 'desc')));
    projects = [];
    snap.forEach(d => projects.push({ id: d.id, ...d.data() }));
    renderSidebar();
    if (projects.length === 0) {
      // 何もない状態でOK、保存時に自動作成される
    } else {
      loadProject(projects[0].id);
    }
  }

  // ─── SIDEBAR ───
  function renderSidebar() {
    const list = document.getElementById('project-list');
    list.innerHTML = '';
    projects.forEach(p => {
      const item = document.createElement('div');
      item.className = 'project-item' + (p.id === currentId ? ' active' : '');
      item.innerHTML = `<span class="proj-name">${p.title || '無題'}</span><button class="overwrite-btn" title="上書き保存">上書き</button><span class="del-proj" title="削除">×</span>`;
      item.querySelector('.proj-name').onclick = () => loadProject(p.id);
      item.querySelector('.overwrite-btn').onclick = (e) => { e.stopPropagation(); overwriteProject(p.id); };
      item.querySelector('.del-proj').onclick = (e) => { e.stopPropagation(); deleteProject(p.id); };
      list.appendChild(item);
    });
  }

  // ─── LOAD PROJECT ───
  function loadProject(id) {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    currentId = id;
    document.getElementById('project-title-input').value = p.title || '無題';
    const ta = document.getElementById('text-input');
    ta.value = p.text || '';
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    if (p.text && p.text.trim()) {
      buildBoardInternal(p.text);
    } else {
      document.getElementById('board-inner').innerHTML =
        `<div class="empty-state"><div class="hint">▤</div>テキストをペーストして「生成」を押してください</div>`;
    }
    renderSidebar();
  }

  // ─── CREATE PROJECT ───
  async function createProject(title = '無題') {
    const id = 'proj-' + Date.now();
    const data = { title, text: '', updatedAt: Date.now() };
    await setDoc(doc(db, 'storyboard-projects', id), data);
    projects.unshift({ id, ...data });
    currentId = id;
    document.getElementById('project-title-input').value = title;
    document.getElementById('text-input').value = '';
    document.getElementById('board-inner').innerHTML =
      `<div class="empty-state"><div class="hint">▤</div>テキストをペーストして「生成」を押してください</div>`;
    renderSidebar();
  }

  // ─── DELETE PROJECT ───
  async function deleteProject(id) {
    if (!confirm('このプロジェクトを削除しますか？')) return;
    await deleteDoc(doc(db, 'storyboard-projects', id));
    projects = projects.filter(p => p.id !== id);
    if (currentId === id) {
      currentId = null;
      if (projects.length > 0) loadProject(projects[0].id);
      // 全部消えたら空のままでOK
    }
    renderSidebar();
    showToast('🗑 削除しました');
  }

  // ─── SAVE TO CLOUD（毎回新規） ───
  window.saveToCloud = async () => {
    const title = document.getElementById('project-title-input').value || '無題';
    const text = document.getElementById('text-input').value;
    const id = 'proj-' + Date.now();
    const data = { title, text, updatedAt: Date.now() };
    await setDoc(doc(db, 'storyboard-projects', id), data);
    projects.unshift({ id, ...data });
    currentId = id;
    renderSidebar();
    showToast('☁ 保存しました');
  };

  // ─── NEW PROJECT ───
  window.newProject = () => createProject('無題');

  // ─── OVERWRITE PROJECT ───
  async function overwriteProject(id) {
    const title = document.getElementById('project-title-input').value || '無題';
    const text = document.getElementById('text-input').value;
    const data = { title, text, updatedAt: Date.now() };
    await setDoc(doc(db, 'storyboard-projects', id), data);
    const p = projects.find(x => x.id === id);
    if (p) Object.assign(p, data);
    renderSidebar();
    showToast('✏️ 上書きしました');
  }

  // ─── BUILD BOARD (internal) ───
  function buildBoardInternal(raw) {
    const groups = [];
    let current = [];
    for (const line of raw.split('\n')) {
      if (line.trim() === '') {
        if (current.length > 0) { groups.push(current.join('\n')); current = []; }
      } else {
        current.push(line);
      }
    }
    if (current.length > 0) groups.push(current.join('\n'));
    if (groups.length === 0) return false;

    const inner = document.getElementById('board-inner');
    inner.innerHTML = '';
    groups.forEach((group, idx) => {
      const row = document.createElement('div');
      row.className = 'sb-row';

      const frame = document.createElement('div');
      frame.className = 'sb-frame';

      const frameBox = document.createElement('div');
      frameBox.className = 'frame-box';
      const num = document.createElement('span');
      num.className = 'frame-number';
      num.textContent = String(idx + 1).padStart(2, '0');
      frameBox.appendChild(num);
      frame.appendChild(frameBox);

      const textDiv = document.createElement('div');
      textDiv.className = 'sb-text';
      const p = document.createElement('p');
      p.textContent = group;
      textDiv.appendChild(p);

      row.appendChild(frame);
      row.appendChild(textDiv);
      inner.appendChild(row);
    });
    return true;
  }

  // ─── BUILD BOARD (public) ───
  window.buildBoard = () => {
    const raw = document.getElementById('text-input').value;
    if (!buildBoardInternal(raw)) alert('テキストをペーストしてください');
  };

  // ─── SAVE AS PNG ───
  window.saveAsPng = async () => {
    const inner = document.getElementById('board-inner');
    if (inner.querySelector('.empty-state')) { alert('先にテキストを生成してください'); return; }
    const btn = document.querySelector('.btn-save');
    btn.textContent = '...';
    btn.disabled = true;
    try {
      const canvas = await html2canvas(inner, { scale: 2, backgroundColor: '#fdfaf5', useCORS: true, logging: false });
      const title = document.getElementById('project-title-input').value || 'storyboard';
      const link = document.createElement('a');
      link.download = `${title}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) { alert('保存に失敗しました'); }
    finally { btn.textContent = 'PNG'; btn.disabled = false; }
  };

  document.getElementById('text-input').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') window.buildBoard();
  });

  // ─── AUTO RESIZE TEXTAREA ───
  const ta = document.getElementById('text-input');
  const autoResize = () => {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  };
  ta.addEventListener('input', autoResize);

  loadProjects();
</script>
</body>
</html>
