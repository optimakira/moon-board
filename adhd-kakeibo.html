<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>こいん 💰</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{min-height:100vh;background:linear-gradient(160deg,#0a0a14 0%,#12122a 60%,#0f1a24 100%);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#f0f0ff;display:flex;flex-direction:column;align-items:center;padding-bottom:90px}
  .blob1{position:fixed;top:-120px;right:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(100,100,255,.07) 0%,transparent 70%);pointer-events:none}
  .blob2{position:fixed;bottom:-80px;left:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,80,120,.06) 0%,transparent 70%);pointer-events:none}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-130px) scale(1.6)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulseBtn{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .ca{animation:slideUp .35s ease both}
  .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(12px);border-radius:20px}
  .rr:hover{background:rgba(255,255,255,.04)}
  .db{opacity:0;transition:opacity .2s}.rr:hover .db,.rr:active .db{opacity:1}
  .tb{transition:all .18s ease;cursor:pointer}
  .cb{transition:all .15s ease;cursor:pointer}.cb:hover{transform:scale(1.06)}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7)}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
  .pill{border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .13s;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:rgba(255,255,255,.55)}
  .pill.active{background:rgba(102,126,234,.28);border-color:#667eea;color:#a5b4fc}
  .pill.disabled{opacity:.3;cursor:default}
  input,button{font-family:inherit}
  .inp{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:11px 14px;font-size:15px;color:#fff;outline:none}
  .btn-main{background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:18px;padding:20px;cursor:pointer;color:#fff;font-size:19px;font-weight:900;box-shadow:0 8px 28px rgba(102,126,234,.38);animation:pulseBtn 2.2s ease-in-out infinite;width:100%}
  .btn-save{background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:14px;padding:14px;cursor:pointer;color:#fff;font-size:15px;font-weight:800;width:100%;box-shadow:0 6px 18px rgba(102,126,234,.3)}
  .btn-rec{background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:17px;padding:19px;cursor:pointer;color:#fff;font-size:17px;font-weight:900;width:100%;box-shadow:0 8px 24px rgba(102,126,234,.32)}
  .btn-rec:disabled{background:rgba(255,255,255,.07);box-shadow:none;color:rgba(255,255,255,.25);cursor:not-allowed}
  .del-btn{background:rgba(255,80,80,.15);border:1px solid rgba(255,80,80,.3);border-radius:6px;color:#ff8080;font-size:11px;cursor:pointer;padding:3px 8px}
  .section-label{font-size:12px;color:rgba(255,255,255,.4);font-weight:700}
  .dgh{padding:7px 18px;font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.025);font-weight:700}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s ease}
  .modal{width:100%;max-width:440px;background:#1a1a2e;border:1px solid rgba(255,255,255,.12);border-radius:24px 24px 0 0;padding:24px 22px 40px;max-height:88vh;overflow-y:auto}
  .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.4);border-radius:12px;padding:10px 20px;font-size:13px;color:#4ADE80;font-weight:700;z-index:200;animation:fadein .3s ease;pointer-events:none;white-space:nowrap}
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,20,.96);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.07);display:flex;justify-content:center;padding:10px 0 18px}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 16px;cursor:pointer;transition:all .18s}
  .nav-icon{display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:18px;transition:all .2s;width:36px;height:36px}
  .nav-icon.big{width:50px;height:50px;border-radius:16px;background:linear-gradient(135deg,#667eea,#764ba2);font-size:22px;margin-top:-18px;box-shadow:0 4px 18px rgba(102,126,234,.4)}
  .nav-icon.active{background:rgba(102,126,234,.18);border:1px solid rgba(102,126,234,.35)}
  .nav-label{font-size:9px;color:rgba(255,255,255,.3)}
  .nav-label.active{color:#a5b4fc;font-weight:700}
  .loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:36px;animation:spin 1.5s linear infinite}
  .type-toggle{display:flex;gap:0;background:rgba(255,255,255,.06);border-radius:12px;padding:3px}
  .type-btn{flex:1;padding:9px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;background:transparent;color:rgba(255,255,255,.45)}
  .type-btn.active-exp{background:rgba(255,107,107,.25);color:#FF6B6B}
  .type-btn.active-inc{background:rgba(45,212,191,.25);color:#2dd4bf}
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>
<div id="root"><div class="loading-screen">💰</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEE451bCNLV-Ty337LyZryFlZqqiN4mxo",
  authDomain: "moonboard-27ebf.firebaseapp.com",
  projectId: "moonboard-27ebf",
  storageBucket: "moonboard-27ebf.firebasestorage.app",
  messagingSenderId: "437383444283",
  appId: "1:437383444283:web:f2fab00c5e190b2ca9291e"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const SID = "shared";

const QUICK  = [300,500,1000,1500,2000,3000];
const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const PRESET_COLORS = ["#FF6B6B","#FFA94D","#74C0FC","#B197FC","#63E6BE","#F783AC","#69DB7C","#FFE066","#7EC8E3","#A9A9A9"];
const PRESET_EMOJIS = ["🏷","🎵","✈️","🐾","🌿","💄","📚","🍺","🎁","🏋️","🚗","💻"];
const INC_CATS = [
  {id:"salary",emoji:"💼",label:"給与"},
  {id:"bonus",emoji:"🎁",label:"ボーナス"},
  {id:"side",emoji:"💻",label:"副業"},
  {id:"other_inc",emoji:"💰",label:"その他"},
];
const DEFAULT_CATS = [
  {id:"food",emoji:"🍱",label:"食費",color:"#FF6B6B",order:0},
  {id:"cafe",emoji:"☕",label:"カフェ",color:"#FFA94D",order:1},
  {id:"transport",emoji:"🚃",label:"交通",color:"#74C0FC",order:2},
  {id:"shopping",emoji:"🛍",label:"買い物",color:"#B197FC",order:3},
  {id:"entertainment",emoji:"🎮",label:"娯楽",color:"#63E6BE",order:4},
  {id:"health",emoji:"💊",label:"医療",color:"#F783AC",order:5},
  {id:"utility",emoji:"🏠",label:"光熱費",color:"#69DB7C",order:6},
  {id:"other",emoji:"📦",label:"その他",color:"#A9A9A9",order:7},
];

const yen   = n  => `¥${Number(n).toLocaleString()}`;
const today = () => new Date().toISOString().slice(0,10);
const toYM  = d  => d.slice(0,7);
const toY   = d  => d.slice(0,4);
const nowY  = new Date().getFullYear();
const nowM  = new Date().getMonth()+1;

let state = {
  screen:"home", records:[], categories:[], settings:{budget:50000}, syncing:true,
  recType:"expense", selCat:null, selIncCat:null, amount:"", note:"", addDate:today(),
  reviewMode:"month", reviewYear:nowY, reviewMonth:nowM, showYoY:false,
  showCatEditor:false, showSettings:false,
  newEmoji:"🏷", newLabel:"", newColor:"#7EC8E3", deletingCatId:null,
  budgetInput:"", toast:null,
};
function setState(p){ state={...state,...p}; render(); }

// Firestore
const recCol = collection(db,"spaces",SID,"records");
const catCol = collection(db,"spaces",SID,"categories");
const setDoc2= doc(db,"spaces",SID,"settings","main");

onSnapshot(query(recCol,orderBy("date","desc")), snap=>{
  setState({records:snap.docs.map(d=>({...d.data(),fid:d.id})),syncing:false});
});
onSnapshot(catCol, snap=>{
  if(snap.empty){
    DEFAULT_CATS.forEach(c=>setDoc(doc(db,"spaces",SID,"categories",c.id),c));
  } else {
    setState({categories:snap.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>(a.order||0)-(b.order||0))});
  }
});
onSnapshot(setDoc2, snap=>{
  if(snap.exists()) setState({settings:snap.data()});
});

async function addRecord(){
  const {recType,selCat,selIncCat,amount,note,addDate}=state;
  const cat=recType==="expense"?selCat:selIncCat;
  if(!cat||!amount) return;
  await addDoc(recCol,{type:recType,category:cat,amount:parseInt(amount),note:note||"記録",date:addDate,createdAt:Date.now()});
  setState({selCat:null,selIncCat:null,amount:"",note:"",addDate:today(),screen:"home"});
  showToast(recType==="expense"?"支出を記録したよ！✨":"収入を記録したよ！💚");
}
async function deleteRecord(fid){
  await deleteDoc(doc(db,"spaces",SID,"records",fid));
  showToast("削除しました");
}
async function addCategory(){
  const {newEmoji,newLabel,newColor,categories}=state;
  if(!newLabel.trim()) return;
  const id=`custom_${Date.now()}`;
  await setDoc(doc(db,"spaces",SID,"categories",id),{id,emoji:newEmoji,label:newLabel.trim(),color:newColor,order:categories.length});
  setState({newLabel:"",newEmoji:"🏷",newColor:"#7EC8E3"});
  showToast("カテゴリを追加しました！");
}
async function deleteCategory(id){
  setState({deletingCatId:id});
  await deleteDoc(doc(db,"spaces",SID,"categories",id));
  setState({deletingCatId:null});
  showToast("削除しました");
}
async function saveBudget(){
  const v=parseInt(state.budgetInput);
  if(!v||v<=0) return;
  await setDoc(setDoc2,{...state.settings,budget:v});
  setState({showSettings:false,budgetInput:""});
  showToast(`予算を${yen(v)}に設定しました！`);
}
function showToast(msg){
  setState({toast:msg});
  setTimeout(()=>setState({toast:null}),2200);
}

function derived(){
  const {records,categories,settings,reviewMode,reviewYear,reviewMonth}=state;
  const BUDGET=settings.budget||50000;
  const catMap=Object.fromEntries(categories.map(c=>[c.id,c]));
  const incMap=Object.fromEntries(INC_CATS.map(c=>[c.id,c]));
  const allMap={...catMap,...incMap};
  const expRecs=records.filter(r=>r.type!=="income");
  const incRecs=records.filter(r=>r.type==="income");
  const curYM=toYM(today());
  const todayExp=expRecs.filter(r=>r.date===today()).reduce((s,r)=>s+r.amount,0);
  const monthExp=expRecs.filter(r=>toYM(r.date)===curYM).reduce((s,r)=>s+r.amount,0);
  const monthInc=incRecs.filter(r=>toYM(r.date)===curYM).reduce((s,r)=>s+r.amount,0);
  const remaining=BUDGET-monthExp;
  const ratio=Math.min(monthExp/BUDGET,1);
  const sc=ratio<.6?"#4ADE80":ratio<.85?"#FFA94D":"#FF6B6B";
  const se=ratio<.6?"🟢":ratio<.85?"🟡":"🔴";
  const st=ratio<.6?"余裕あり！":ratio<.85?"そろそろ注意":"ピンチ！";
  const allYears=[...new Set(records.map(r=>parseInt(toY(r.date))))].sort();
  if(!allYears.includes(nowY)) allYears.push(nowY);

  const rYM=`${reviewYear}-${String(reviewMonth).padStart(2,"0")}`;
  const pYear=reviewYear-1;
  const pYM=`${pYear}-${String(reviewMonth).padStart(2,"0")}`;
  const revExp=reviewMode==="month"?expRecs.filter(r=>toYM(r.date)===rYM):expRecs.filter(r=>toY(r.date)===String(reviewYear));
  const prevExp=reviewMode==="month"?expRecs.filter(r=>toYM(r.date)===pYM):expRecs.filter(r=>toY(r.date)===String(pYear));
  const revInc=reviewMode==="month"?incRecs.filter(r=>toYM(r.date)===rYM):incRecs.filter(r=>toY(r.date)===String(reviewYear));
  const revTotal=revExp.reduce((s,r)=>s+r.amount,0);
  const prevTotal=prevExp.reduce((s,r)=>s+r.amount,0);
  const revIncTotal=revInc.reduce((s,r)=>s+r.amount,0);

  const mBars=MONTHS.map((_,mi)=>{
    const ym=`${reviewYear}-${String(mi+1).padStart(2,"0")}`;
    return {label:`${mi+1}月`,value:expRecs.filter(r=>toYM(r.date)===ym).reduce((s,r)=>s+r.amount,0),highlight:reviewMode==="month"&&mi+1===reviewMonth};
  });
  const pBars=MONTHS.map((_,mi)=>{
    const ym=`${pYear}-${String(mi+1).padStart(2,"0")}`;
    return {label:`${mi+1}月`,value:expRecs.filter(r=>toYM(r.date)===ym).reduce((s,r)=>s+r.amount,0),highlight:false};
  });
  const donutSegs=categories.map(cat=>({
    label:cat.label,color:cat.color,catId:cat.id,
    value:revExp.filter(r=>r.category===cat.id).reduce((s,r)=>s+r.amount,0),
    prevValue:prevExp.filter(r=>r.category===cat.id).reduce((s,r)=>s+r.amount,0),
  })).filter(s=>s.value>0).sort((a,b)=>b.value-a.value);

  const grpRev={};
  [...revExp,...revInc].sort((a,b)=>b.date.localeCompare(a.date)).forEach(r=>{grpRev[r.date]=grpRev[r.date]||[];grpRev[r.date].push(r);});
  const grpRevArr=Object.entries(grpRev).sort((a,b)=>b[0].localeCompare(a[0]));
  const grpAll={};
  records.forEach(r=>{grpAll[r.date]=grpAll[r.date]||[];grpAll[r.date].push(r);});
  const grpAllArr=Object.entries(grpAll).sort((a,b)=>b[0].localeCompare(a[0]));

  return {BUDGET,catMap,incMap,allMap,expRecs,incRecs,todayExp,monthExp,monthInc,remaining,ratio,sc,se,st,allYears,rYM,pYear,revExp,prevExp,revInc,revTotal,prevTotal,revIncTotal,mBars,pBars,donutSegs,grpRevArr,grpAllArr};
}

function barChart(data,color,compare,height){
  height=height||72;
  const all=[...data.map(d=>d.value),...(compare||[]).map(d=>d.value)];
  const mx=Math.max(...all,1);
  return `<div style="display:flex;align-items:flex-end;gap:${compare?3:5}px;height:${height+20}px">`+
    data.map((d,i)=>{
      const h=Math.max(Math.round((d.value/mx)*height),d.value>0?3:0);
      const bg=d.highlight?`linear-gradient(180deg,${color},${color}88)`:`rgba(255,255,255,0.12)`;
      const cmp=compare&&compare[i]?`<div style="flex:1;border-radius:3px 3px 0 0;height:${Math.max(Math.round((compare[i].value/mx)*height),compare[i].value>0?3:0)}px;background:rgba(255,255,255,0.22)"></div>`:"";
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px"><div style="width:100%;display:flex;gap:2px;align-items:flex-end;height:${height}px"><div style="flex:1;border-radius:3px 3px 0 0;height:${h}px;background:${bg};transition:height .5s"></div>${cmp}</div><div style="font-size:9px;color:rgba(255,255,255,.38);white-space:nowrap">${d.label}</div></div>`;
    }).join("")+"</div>";
}

function donutChart(segs){
  const r=38,cx=60,cy=60,circ=2*Math.PI*r,tot=segs.reduce((s,g)=>s+g.value,0)||1;
  let off=0;
  return `<svg width="130" height="130" viewBox="0 0 120 120"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="18"/>`+
    segs.map(seg=>{const dash=(seg.value/tot)*circ,gap=circ-dash,el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="18" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-off}" stroke-linecap="butt"/>`;off+=dash;return el;}).join("")+
    `<text x="${cx}" y="${cy-6}" text-anchor="middle" fill="white" font-size="10" font-weight="700">合計</text><text x="${cx}" y="${cy+9}" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="9">¥${segs.reduce((s,g)=>s+g.value,0).toLocaleString()}</text></svg>`;
}

function diffBadge(cur,prev){
  if(!prev||!cur) return "";
  const pct=Math.round(((cur-prev)/prev)*100),up=pct>=0;
  return `<span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;background:${up?"rgba(255,107,107,.18)":"rgba(74,222,128,.18)"};color:${up?"#FF6B6B":"#4ADE80"};margin-left:6px">${up?`▲+${pct}%`:`▼${pct}%`}</span>`;
}

function recRow(r,allMap){
  const isInc=r.type==="income";
  const cat=allMap[r.category]||{emoji:"📦",label:"不明",color:"#888"};
  const col=isInc?"#2dd4bf":cat.color;
  return `<div class="rr" style="display:flex;align-items:center;padding:10px 18px;border-top:1px solid rgba(255,255,255,.04)">
    <div style="width:32px;height:32px;border-radius:9px;background:${col}22;display:flex;align-items:center;justify-content:center;font-size:15px;margin-right:10px">${cat.emoji}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:600">${r.note}</div><div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:1px">${cat.label}${isInc?" · 収入":""}</div></div>
    <div style="font-size:14px;font-weight:800;color:${col};margin-right:8px">${isInc?"+":""}${yen(r.amount)}</div>
    <button class="del-btn db" onclick="deleteRecord('${r.fid}')">削除</button>
  </div>`;
}

function render(){
  const s=state, d=derived();
  const {BUDGET,catMap,incMap,allMap,expRecs,incRecs,todayExp,monthExp,monthInc,remaining,ratio,sc,se,st,allYears,pYear,revExp,revInc,revTotal,prevTotal,revIncTotal,mBars,pBars,donutSegs,grpRevArr,grpAllArr}=d;

  const toastHtml=s.toast?`<div class="toast">${s.toast}</div>`:"";
  const navHtml=`<nav class="nav">${[{id:"home",e:"🏠",l:"ホーム"},{id:"add",e:"＋",l:"記録",big:true},{id:"review",e:"📊",l:"振り返り"},{id:"history",e:"📋",l:"履歴"}].map(t=>`
    <div class="nav-item tb" onclick="setScreen('${t.id}')">
      <div class="nav-icon ${t.big?"big":s.screen===t.id?"active":""}">${t.e}</div>
      <div class="nav-label ${s.screen===t.id&&!t.big?"active":""}">${t.l}</div>
    </div>`).join("")}</nav>`;

  const headerHtml=`<div style="width:100%;max-width:440px;padding:28px 22px 0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:22px;font-weight:900;letter-spacing:-.5px">こいん 💰</div>
        <div style="font-size:10px;margin-top:3px;color:${s.syncing?"rgba(255,255,255,.35)":"rgba(74,222,128,.7)"}">${s.syncing?"🔄 同期中...":"✓ 同期済み"}</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <div onclick="openSettings()" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:700;color:rgba(255,255,255,.6)">⚙️ 設定</div>
        <div style="background:rgba(255,180,0,.12);border:1px solid rgba(255,180,0,.25);border-radius:12px;padding:8px 12px;text-align:center"><div style="font-size:16px">🔥</div><div style="font-size:10px;color:#FFD700;font-weight:700">毎日記録</div></div>
      </div>
    </div>
  </div>`;

  let body="";

  if(s.screen==="home"){
    const catBadges=s.categories.filter(c=>expRecs.filter(r=>r.date===today()).some(r=>r.category===c.id)).map(cat=>{
      const t=expRecs.filter(r=>r.date===today()&&r.category===cat.id).reduce((a,r)=>a+r.amount,0);
      return `<div style="background:${cat.color}20;border:1px solid ${cat.color}40;border-radius:99px;padding:3px 10px;font-size:11px;color:${cat.color};font-weight:600">${cat.emoji} ${yen(t)}</div>`;
    }).join("");
    body=`
      <div class="card ca" style="padding:22px 22px 18px;animation-delay:.04s">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:4px">今月の残り（予算 ${yen(BUDGET)}）</div>
            <div style="font-size:34px;font-weight:900;color:${sc};line-height:1">${yen(remaining)}</div></div>
          <div style="background:rgba(255,255,255,.06);border-radius:14px;padding:10px 14px;text-align:center">
            <div style="font-size:22px">${se}</div><div style="font-size:11px;color:${sc};font-weight:700;margin-top:2px">${st}</div>
          </div>
        </div>
        <div style="background:rgba(255,255,255,.08);border-radius:99px;height:8px;overflow:hidden">
          <div style="height:100%;width:${ratio*100}%;background:linear-gradient(90deg,${sc}88,${sc});border-radius:99px;transition:width .6s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:rgba(255,255,255,.3)">
          <span>支出 ${yen(monthExp)}</span>${monthInc>0?`<span style="color:rgba(45,212,191,.7)">収入 +${yen(monthInc)}</span>`:""}
        </div>
      </div>
      <div class="card ca" style="padding:16px 20px;animation-delay:.08s">
        <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:6px">今日の支出</div>
        <div style="font-size:28px;font-weight:900">${yen(todayExp)}</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">${catBadges}</div>
      </div>
      <button class="btn-main" onclick="setScreen('add')">＋ 記録する</button>
      <div class="card ca" style="animation-delay:.12s">
        <div style="padding:14px 18px 6px;font-size:12px;color:rgba(255,255,255,.4);font-weight:700">最近の記録</div>
        ${s.records.slice(0,6).map(r=>recRow(r,allMap)).join("")||`<div style="padding:30px;text-align:center;color:rgba(255,255,255,.25);font-size:13px">記録がまだありません</div>`}
        <div onclick="setScreen('history')" style="padding:10px 18px;text-align:center;font-size:11px;color:rgba(255,255,255,.3);cursor:pointer">すべての履歴 →</div>
      </div>`;
  }

  else if(s.screen==="add"){
    const isExp=s.recType==="expense";
    const hasInput=isExp?(s.selCat&&s.amount):(s.selIncCat&&s.amount);
    const catGrid=s.categories.map(cat=>`
      <div class="cb" onclick="selExpCat('${cat.id}')" style="background:${s.selCat===cat.id?cat.color+"30":"rgba(255,255,255,.05)"};border:2px solid ${s.selCat===cat.id?cat.color:"transparent"};border-radius:13px;padding:10px 4px;text-align:center">
        <div style="font-size:20px">${cat.emoji}</div><div style="font-size:10px;margin-top:3px;color:${s.selCat===cat.id?cat.color:"rgba(255,255,255,.5)"};font-weight:600">${cat.label}</div>
      </div>`).join("");
    const incGrid=INC_CATS.map(cat=>`
      <div class="cb" onclick="selIncCatFn('${cat.id}')" style="background:${s.selIncCat===cat.id?"rgba(45,212,191,.25)":"rgba(255,255,255,.05)"};border:2px solid ${s.selIncCat===cat.id?"#2dd4bf":"transparent"};border-radius:13px;padding:10px 4px;text-align:center">
        <div style="font-size:20px">${cat.emoji}</div><div style="font-size:10px;margin-top:3px;color:${s.selIncCat===cat.id?"#2dd4bf":"rgba(255,255,255,.5)"};font-weight:600">${cat.label}</div>
      </div>`).join("");
    const quickBtns=QUICK.map(q=>`
      <div onclick="setAmt('${q}')" style="background:${s.amount===String(q)?(isExp?"rgba(102,126,234,.28)":"rgba(45,212,191,.22)"):"rgba(255,255,255,.06)"};border:1px solid ${s.amount===String(q)?(isExp?"#667eea":"#2dd4bf"):"rgba(255,255,255,.1)"};border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;color:${s.amount===String(q)?(isExp?"#a5b4fc":"#2dd4bf"):"rgba(255,255,255,.6)"}">${yen(q)}</div>`).join("");
    body=`
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="setScreen('home')" style="background:rgba(255,255,255,.08);border:none;border-radius:10px;width:36px;height:36px;cursor:pointer;color:#fff;font-size:18px">←</button>
        <div style="font-size:18px;font-weight:900">記録する</div>
      </div>
      <div class="card ca" style="padding:14px 16px">
        <div class="type-toggle">
          <button class="type-btn ${isExp?"active-exp":""}" onclick="setRecType('expense')">💸 支出</button>
          <button class="type-btn ${!isExp?"active-inc":""}" onclick="setRecType('income')">💚 収入</button>
        </div>
      </div>
      <div class="card ca" style="padding:16px 18px;animation-delay:.03s">
        <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px">📅 日付（過去もOK）</div>
        <input class="inp" type="date" value="${s.addDate}" max="${today()}" onchange="setAddDate(this.value)">
        ${s.addDate!==today()?`<div style="margin-top:8px;font-size:11px;color:#FFA94D;background:rgba(255,169,77,.1);border-radius:8px;padding:6px 10px">📝 過去の記録として追加します</div>`:""}
      </div>
      <div class="card ca" style="padding:16px 18px;animation-delay:.06s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:11px;color:rgba(255,255,255,.4)">カテゴリ</div>
          ${isExp?`<div onclick="openCatEditor()" style="font-size:11px;color:#a5b4fc;cursor:pointer;font-weight:600">✏️ 編集</div>`:""}
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${isExp?catGrid:incGrid}</div>
      </div>
      <div class="card ca" style="padding:16px 18px;animation-delay:.09s">
        <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:10px">金額</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${quickBtns}</div>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:rgba(255,255,255,.35);font-weight:700">¥</span>
          <input class="inp" type="number" placeholder="金額を入力" value="${s.amount}" oninput="setAmount(this.value)" style="padding-left:34px;font-size:20px;font-weight:900">
        </div>
      </div>
      <div class="card ca" style="padding:16px 18px;animation-delay:.12s">
        <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px">メモ（任意）</div>
        <input class="inp" placeholder="例：ランチ、給料日..." value="${s.note}" oninput="setNote(this.value)">
      </div>
      <button class="btn-rec" onclick="addRecord()" ${hasInput?"":"disabled"} style="${!isExp&&hasInput?"background:linear-gradient(135deg,#2dd4bf,#0d9488);box-shadow:0 8px 24px rgba(45,212,191,.3)":""}">
        ${isExp?"支出を記録する 💸":"収入を記録する 💚"}
      </button>
      <div style="font-size:11px;text-align:center;color:rgba(255,255,255,.2)">細かい金額は気にしなくてOK 👍</div>`;
  }

  else if(s.screen==="review"){
    const revTitle=s.reviewMode==="month"?`${s.reviewYear}年 ${s.reviewMonth}月`:`${s.reviewYear}年`;
    const yearBtns=allYears.map(y=>`<div class="pill ${s.reviewYear===y?"active":""}" onclick="setReviewYear(${y})">${y}年</div>`).join("");
    const monthBtns=MONTHS.map((ml,mi)=>{
      const ym=`${s.reviewYear}-${String(mi+1).padStart(2,"0")}`;
      const has=s.records.some(r=>toYM(r.date)===ym);
      return `<div class="pill ${s.reviewMonth===mi+1&&s.reviewMode==="month"?"active":""} ${has?"":"disabled"}" onclick="${has?`setReviewMonth(${mi+1})`:""}">${ml}</div>`;
    }).join("");

    // weekly
    let weeklyHtml="";
    if(s.reviewMode==="month"){
      const [y,m]=d.rYM.split("-").map(Number),days=new Date(y,m,0).getDate(),mp={};
      revExp.forEach(r=>{const dd=parseInt(r.date.slice(8));mp[dd]=(mp[dd]||0)+r.amount;});
      const wBars=Array.from({length:Math.ceil(days/7)},(_,w)=>{
        const s2=w*7+1,e=Math.min(s2+6,days);
        return {label:`${s2}~${e}日`,value:Object.entries(mp).filter(([dd])=>+dd>=s2&&+dd<=e).reduce((a,[,v])=>a+v,0),highlight:true};
      });
      weeklyHtml=`<div class="card ca" style="padding:18px 20px"><div class="section-label" style="margin-bottom:12px">週別支出</div>${barChart(wBars,"#F783AC",null,64)}</div>`;
    }

    // yoy table
    let yoyTable="";
    if(s.reviewMode==="year"&&s.showYoY){
      const rows=MONTHS.map((_,mi)=>{
        const ym=`${s.reviewYear}-${String(mi+1).padStart(2,"0")}`,pym=`${pYear}-${String(mi+1).padStart(2,"0")}`;
        const cur=expRecs.filter(r=>toYM(r.date)===ym).reduce((a,r)=>a+r.amount,0);
        const prv=expRecs.filter(r=>toYM(r.date)===pym).reduce((a,r)=>a+r.amount,0);
        if(!cur&&!prv) return "";
        const diff=cur-prv;
        return `<div style="font-size:11px;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.55)">${mi+1}月</div>
          <div style="font-size:11px;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.4)">${prv?yen(prv):"—"}</div>
          <div style="font-size:11px;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.05);font-weight:700">${cur?yen(cur):"—"}</div>
          <div style="font-size:11px;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.05);color:${diff>0?"#FF6B6B":diff<0?"#4ADE80":"rgba(255,255,255,.3)"};font-weight:700">${prv&&cur?(diff>0?"+":"")+yen(diff):"—"}</div>`;
      }).join("");
      yoyTable=`<div class="card ca" style="padding:18px 20px"><div class="section-label" style="margin-bottom:14px">${pYear}年 vs ${s.reviewYear}年 比較</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr">${["月","前年","今年","差"].map(h=>`<div style="font-size:10px;color:rgba(255,255,255,.3);padding:4px 8px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.08)">${h}</div>`).join("")}${rows}</div></div>`;
    }

    // donut
    const donutHtml=donutSegs.length>0?`
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
        ${donutChart(donutSegs)}
        <div style="flex:1;display:flex;flex-direction:column;gap:7px;min-width:120px">
          ${donutSegs.map(seg=>`<div style="display:flex;align-items:center;gap:8px"><div style="width:9px;height:9px;border-radius:50%;background:${seg.color};flex-shrink:0"></div><div style="flex:1;font-size:12px">${seg.label}</div><div style="font-size:12px;font-weight:700;color:${seg.color}">${yen(seg.value)}</div></div>`).join("")}
        </div>
      </div>
      ${donutSegs.map(seg=>{const pct=revTotal>0?seg.value/revTotal:0;return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px">
          <span>${s.categories.find(c=>c.id===seg.catId)?.emoji||""} ${seg.label}</span>
          <div style="display:flex;align-items:center"><span style="font-weight:700;color:${seg.color}">${yen(seg.value)}</span>${diffBadge(seg.value,seg.prevValue)}</div>
        </div>
        <div style="background:rgba(255,255,255,.07);border-radius:99px;height:6px"><div style="height:100%;width:${pct*100}%;background:${seg.color};border-radius:99px;transition:width .6s"></div></div>
        <div style="font-size:9px;color:rgba(255,255,255,.25);margin-top:2px">${Math.round(pct*100)}%</div>
      </div>`;}).join("")}`:`<div style="font-size:13px;color:rgba(255,255,255,.3);padding:20px 0;text-align:center">この期間の支出記録がありません</div>`;

    const grpRows=grpRevArr.map(([date,recs])=>`
      <div class="dgh">${date}　支出 ${yen(recs.filter(r=>r.type!=="income").reduce((s,r)=>s+r.amount,0))}${recs.some(r=>r.type==="income")?` · 収入 +${yen(recs.filter(r=>r.type==="income").reduce((s,r)=>s+r.amount,0))}`:""}
      </div>${recs.map(r=>recRow(r,allMap)).join("")}`).join("");

    body=`
      <div style="font-size:18px;font-weight:900">📊 振り返り</div>
      <div class="card ca" style="padding:16px 18px">
        <div style="display:flex;gap:8px;margin-bottom:16px">
          <div class="pill ${s.reviewMode==="month"?"active":""}" onclick="setReviewMode('month')" style="flex:1;text-align:center;font-size:13px;padding:9px 0">月別</div>
          <div class="pill ${s.reviewMode==="year"?"active":""}" onclick="setReviewMode('year')" style="flex:1;text-align:center;font-size:13px;padding:9px 0">年別</div>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px">年を選択</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${yearBtns}</div>
        ${s.reviewMode==="month"?`<div style="margin-top:12px"><div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px">月を選択</div><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:5px">${monthBtns}</div></div>`:""}
      </div>
      <div class="card ca" style="padding:20px 22px;animation-delay:.04s">
        <div style="font-size:12px;color:rgba(255,255,255,.4);margin-bottom:4px">${revTitle}</div>
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
          <div style="font-size:32px;font-weight:900;color:#a5b4fc">${yen(revTotal)}</div>${diffBadge(revTotal,prevTotal)}
        </div>
        ${revIncTotal>0?`<div style="margin-top:6px;font-size:12px;color:rgba(45,212,191,.8);font-weight:700">収入 +${yen(revIncTotal)}　収支 <span style="color:${revIncTotal-revTotal>=0?"#4ADE80":"#FF6B6B"}">${revIncTotal-revTotal>=0?"+":""}${yen(revIncTotal-revTotal)}</span></div>`:""}
        ${prevTotal>0?`<div style="font-size:11px;color:rgba(255,255,255,.3);margin-top:4px">前年同期 ${yen(prevTotal)}　差額 <span style="color:${revTotal>prevTotal?"#FF6B6B":"#4ADE80"};font-weight:700">${revTotal>prevTotal?"+":""}${yen(revTotal-prevTotal)}</span></div>`:""}
      </div>
      <div class="card ca" style="padding:18px 20px;animation-delay:.07s">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="section-label">${s.reviewYear}年 月別支出</div>
          <div onclick="toggleYoY()" style="font-size:11px;font-weight:700;cursor:pointer;padding:4px 10px;border-radius:8px;background:${s.showYoY?"rgba(102,126,234,.25)":"rgba(255,255,255,.06)"};border:1px solid ${s.showYoY?"#667eea":"rgba(255,255,255,.1)"};color:${s.showYoY?"#a5b4fc":"rgba(255,255,255,.4)"}">前年比較 ${s.showYoY?"ON":"OFF"}</div>
        </div>
        ${barChart(mBars,"#667eea",s.showYoY?pBars:null,72)}
        ${s.showYoY?`<div style="display:flex;gap:12px;margin-top:8px;font-size:10px;color:rgba(255,255,255,.35)"><span>■ <span style="color:#667eea">${s.reviewYear}年</span></span><span>■ <span style="color:rgba(255,255,255,.4)">${pYear}年</span></span></div>`:""}
      </div>
      ${yoyTable}${weeklyHtml}
      <div class="card ca" style="padding:18px 20px;animation-delay:.12s">
        <div class="section-label" style="margin-bottom:14px">カテゴリ別（支出）</div>${donutHtml}
      </div>
      ${grpRows?`<div class="card ca" style="animation-delay:.14s"><div style="padding:14px 18px 6px" class="section-label">日別記録（${revExp.length+revInc.length}件）</div>${grpRows}</div>`:""}`;
  }

  else if(s.screen==="history"){
    const rows=grpAllArr.map(([date,recs])=>`
      <div class="dgh">${date}　支出 ${yen(recs.filter(r=>r.type!=="income").reduce((s,r)=>s+r.amount,0))}${recs.some(r=>r.type==="income")?` · 収入 +${yen(recs.filter(r=>r.type==="income").reduce((s,r)=>s+r.amount,0))}`:""}
      </div>${recs.map(r=>recRow(r,allMap)).join("")}`).join("");
    body=`
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="setScreen('home')" style="background:rgba(255,255,255,.08);border:none;border-radius:10px;width:36px;height:36px;cursor:pointer;color:#fff;font-size:18px">←</button>
        <div style="font-size:18px;font-weight:900">すべての履歴</div>
      </div>
      <div class="card ca">${rows||`<div style="padding:40px;text-align:center;color:rgba(255,255,255,.3)">記録がまだありません</div>`}</div>`;
  }

  // cat modal
  const catModal=s.showCatEditor?`<div class="modal-bg" onclick="closeCatEditor()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:16px;font-weight:900;margin-bottom:4px">カテゴリを編集</div>
    <div style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:16px">追加・削除ができます</div>
    <div style="margin-bottom:18px">${s.categories.map(cat=>`<div style="display:flex;align-items:center;padding:10px 12px;background:rgba(255,255,255,.05);border-radius:12px;margin-bottom:6px">
      <span style="font-size:20px;margin-right:10px">${cat.emoji}</span>
      <div style="flex:1;font-size:14px;font-weight:600">${cat.label}</div>
      <div style="width:12px;height:12px;border-radius:50%;background:${cat.color};margin-right:12px"></div>
      <button class="del-btn" onclick="deleteCategory('${cat.id}')" ${s.deletingCatId===cat.id?"disabled":""}>${s.deletingCatId===cat.id?"削除中...":"削除"}</button>
    </div>`).join("")}</div>
    <div style="height:1px;background:rgba(255,255,255,.08);margin-bottom:16px"></div>
    <div style="font-size:14px;font-weight:700;margin-bottom:12px">＋ 新しいカテゴリを追加</div>
    <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px">絵文字</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${PRESET_EMOJIS.map(e=>`<div onclick="setNewEmoji('${e}')" style="font-size:22px;cursor:pointer;padding:6px;border-radius:10px;background:${s.newEmoji===e?"rgba(102,126,234,.25)":"rgba(255,255,255,.05)"};border:1px solid ${s.newEmoji===e?"#667eea":"transparent"}">${e}</div>`).join("")}</div>
    <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px">カテゴリ名</div>
    <input class="inp" placeholder="例：美容、ペット..." value="${s.newLabel}" oninput="setNewLabel(this.value)" style="margin-bottom:12px">
    <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px">カラー</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${PRESET_COLORS.map(c=>`<div onclick="setNewColor('${c}')" style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${s.newColor===c?"white":"transparent"};box-sizing:border-box"></div>`).join("")}</div>
    <button onclick="addCategory()" ${!s.newLabel.trim()?"disabled":""} style="background:${s.newLabel.trim()?"linear-gradient(135deg,#667eea,#764ba2)":"rgba(255,255,255,.07)"};border:none;border-radius:14px;padding:16px;cursor:${s.newLabel.trim()?"pointer":"not-allowed"};color:${s.newLabel.trim()?"#fff":"rgba(255,255,255,.25)"};font-size:15px;font-weight:800;width:100%">追加する</button>
  </div></div>`:"";

  // settings modal
  const settingsModal=s.showSettings?`<div class="modal-bg" onclick="closeSettings()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:16px;font-weight:900;margin-bottom:4px">⚙️ 設定</div>
    <div style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:20px">アプリの設定を変更できます</div>
    <div style="font-size:14px;font-weight:700;margin-bottom:8px">月の予算</div>
    <div style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:10px">現在の予算：<span style="color:#a5b4fc;font-weight:700">${yen(d.BUDGET)}</span></div>
    <div style="position:relative;margin-bottom:14px">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:rgba(255,255,255,.35);font-weight:700">¥</span>
      <input class="inp" type="number" placeholder="例：50000" value="${s.budgetInput}" oninput="setBudgetInput(this.value)" style="padding-left:34px;font-size:18px;font-weight:700">
    </div>
    <button class="btn-save" onclick="saveBudget()" ${!s.budgetInput?"disabled":""} style="${!s.budgetInput?"background:rgba(255,255,255,.07);color:rgba(255,255,255,.25);cursor:not-allowed;box-shadow:none":""}">保存する</button>
  </div></div>`:"";

  document.getElementById("root").innerHTML=`${toastHtml}${headerHtml}
    <div style="width:100%;max-width:440px;padding:16px 22px;display:flex;flex-direction:column;gap:14px">${body}</div>
    ${catModal}${settingsModal}${navHtml}`;
}
